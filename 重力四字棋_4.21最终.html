<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重力四子棋</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #e0e0e0;
  padding: 20px;
}
.container {
  width: 920px;
  max-width: 100%;
  padding: 26px 28px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}
h1 {
  text-align: center;
  font-size: 1.75rem;
  letter-spacing: 6px;
  margin-bottom: 4px;
  background: linear-gradient(90deg, #e94560, #53d8fb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle {
  text-align: center;
  font-size: 0.68rem;
  color: rgba(255, 255, 255, 0.28);
  letter-spacing: 3px;
  margin-bottom: 14px;
}

.info-bar {
  display: flex;
  align-items: center;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 12px;
  padding: 10px 20px;
  margin-bottom: 11px;
  border: 1px solid rgba(255, 255, 255, 0.07);
}
.info-label {
  font-size: 0.67rem;
  color: rgba(255, 255, 255, 0.38);
  letter-spacing: 1px;
  white-space: nowrap;
}
.info-sep {
  width: 1px;
  height: 24px;
  background: rgba(255, 255, 255, 0.08);
  margin: 0 16px;
  flex-shrink: 0;
}
.spacer { flex: 1; }
.sess-set { display: flex; align-items: center; gap: 8px; }
.prac-input {
  width: 64px;
  padding: 3px 6px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 7px;
  color: #53d8fb;
  font-size: 0.95rem;
  text-align: center;
  outline: none;
}
.prac-input:focus { border-color: #53d8fb; }

.badge {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: bold;
  letter-spacing: 1px;
}
.lv0 { background: rgba(150, 150, 150, 0.2); color: #aaa; }
.lv1 { background: rgba(76, 175, 80, 0.2); color: #81c784; }
.lv2 { background: rgba(33, 150, 243, 0.2); color: #64b5f6; }
.lv3 { background: rgba(156, 39, 176, 0.2); color: #ce93d8; }
.lv4 { background: rgba(255, 152, 0, 0.2); color: #ffb74d; }
.lv5 { background: rgba(233, 45, 96, 0.2); color: #f06292; }

.order-btns { display: flex; gap: 6px; }
.cbtn {
  padding: 5px 14px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.04);
  color: rgba(255, 255, 255, 0.48);
  cursor: pointer;
  font-size: 0.8rem;
  letter-spacing: 1px;
  transition: all .2s;
  white-space: nowrap;
}
.cbtn:hover { background: rgba(255, 255, 255, 0.09); color: #fff; }
.cbtn.active {
  background: rgba(83, 216, 251, 0.15);
  border-color: #53d8fb;
  color: #53d8fb;
}

.game-area {
  display: flex;
  gap: 16px;
  margin-bottom: 11px;
  align-items: flex-start;
}

.board-wrap {
  --cell: 64px;
  --gap: 8px;
  padding: 12px 12px 10px;
  border-radius: 14px;
  background: rgba(0, 0, 0, 0.28);
  border: 1px solid rgba(255, 255, 255, 0.08);
}
.drop-row {
  display: grid;
  grid-template-columns: repeat(7, var(--cell));
  gap: var(--gap);
  margin-bottom: 8px;
}
.drop-btn {
  height: 26px;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.11);
  background: rgba(255, 255, 255, 0.05);
  color: rgba(83, 216, 251, 0.86);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all .16s ease;
}
.drop-btn:hover:not(:disabled) {
  background: rgba(83, 216, 251, 0.14);
  border-color: rgba(83, 216, 251, 0.7);
  box-shadow: 0 0 10px rgba(83, 216, 251, 0.32);
}
.drop-btn:disabled {
  cursor: default;
  opacity: 0.28;
}
.board {
  display: grid;
  grid-template-columns: repeat(7, var(--cell));
  gap: var(--gap);
}
.col {
  display: grid;
  grid-template-rows: repeat(6, var(--cell));
  gap: var(--gap);
  cursor: pointer;
}
.col.full { cursor: default; }
.slot {
  width: var(--cell);
  height: var(--cell);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.slot.drop-focus {
  border-color: rgba(83, 216, 251, 0.56);
  background: rgba(83, 216, 251, 0.11);
  box-shadow: inset 0 0 0 1px rgba(83, 216, 251, 0.22), 0 0 12px rgba(83, 216, 251, 0.22);
}
.disc {
  width: 78%;
  height: 78%;
  border-radius: 50%;
  box-shadow: inset 0 -7px 12px rgba(0, 0, 0, 0.25), 0 0 0 rgba(0, 0, 0, 0);
}
.disc.p {
  background: radial-gradient(circle at 32% 28%, #d8b5b8, #c98f93 58%, #a87479);
}
.disc.a {
  background: radial-gradient(circle at 32% 28%, #b8c4d0, #8ea3b7 58%, #6f8399);
}
.disc.new {
  animation: dropPop 0.48s cubic-bezier(0.25, 0.84, 0.3, 1.28) forwards;
}
@keyframes dropPop {
  0% {
    opacity: 0.35;
    transform: translateY(calc(-1 * var(--drop-distance, 80px))) scale(0.72);
  }
  72% {
    opacity: 1;
    transform: translateY(0) scale(1.08);
  }
  100% {
    transform: translateY(0) scale(1);
  }
}
.disc.win-disc {
  animation: winPulse 0.68s ease infinite alternate;
}
@keyframes winPulse {
  from { transform: scale(1); box-shadow: 0 0 6px rgba(255, 215, 0, 0.35); }
  to { transform: scale(1.1); box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }
}

.think-panel {
  flex: 1;
  background: rgba(0, 0, 0, 0.28);
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  padding: 13px;
  min-height: 470px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.tp-title {
  font-size: 0.65rem;
  color: rgba(255, 255, 255, 0.3);
  letter-spacing: 2px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  margin-bottom: 10px;
  flex-shrink: 0;
  font-family: 'Courier New', monospace;
}
.tp-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 10px;
  min-height: 0;
}
#tpStatus {
  width: 100%;
  flex: 0 0 auto;
  min-height: 96px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: flex-start;
  overflow: auto;
}
.tp-caption {
  font-size: 0.72rem;
  color: rgba(255, 255, 255, 0.34);
  letter-spacing: 0.5px;
  font-family: 'Courier New', monospace;
  line-height: 1.9;
  text-align: left;
}
.tp-caption.active { color: rgba(83, 216, 251, 0.68); }
.tp-result {
  margin-top: 6px;
  font-weight: 700;
}
.tp-loading {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
  width: 100%;
}
.tp-loading-log {
  font-family: 'Courier New', 'Consolas', monospace;
  font-size: 0.72rem;
  color: rgba(83, 216, 251, 0.5);
  letter-spacing: 0.5px;
  text-align: left;
  min-width: 180px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.tp-log-line { opacity: 0; animation: lineIn .2s ease forwards; }
.tp-dots { display: flex; gap: 5px; }
.tp-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #53d8fb;
  animation: dotB 1.2s ease infinite;
}
.tp-dots span:nth-child(2) { animation-delay: .2s; }
.tp-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes dotB {
  0%, 80%, 100% { opacity: .15; transform: scale(.8); }
  40% { opacity: 1; transform: scale(1.2); }
}
@keyframes lineIn { to { opacity: 1; } }
.tp-c4-wrap {
  width: 100%;
  display: flex;
  justify-content: center;
  flex: 0 0 auto;
}
.tp-c4-board {
  --tcell: 40px;
  --tgap: 5px;
  display: grid;
  grid-template-columns: repeat(7, var(--tcell));
  gap: var(--tgap);
}
.tp-slot {
  width: var(--tcell);
  height: var(--tcell);
  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.07);
  background: rgba(255, 255, 255, 0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .18s;
}
.tp-slot.rate-chosen {
  border-color: rgba(83, 216, 251, 0.82);
  background: rgba(83, 216, 251, 0.16);
  box-shadow: 0 0 12px rgba(83, 216, 251, 0.38);
}
.tp-slot.rate-scan {
  border-color: rgba(255, 236, 125, 0.86);
  background: rgba(255, 236, 125, 0.12);
  box-shadow: 0 0 12px rgba(255, 236, 125, 0.3);
}
.tp-disc {
  width: 76%;
  height: 76%;
  border-radius: 50%;
  box-shadow: inset 0 -6px 9px rgba(0, 0, 0, 0.22);
}
.tp-disc.p {
  background: radial-gradient(circle at 32% 28%, #d8b5b8, #c98f93 58%, #a87479);
}
.tp-disc.a {
  background: radial-gradient(circle at 32% 28%, #b8c4d0, #8ea3b7 58%, #6f8399);
}
.tp-disc.win-disc {
  animation: winPulse .68s ease infinite alternate;
}
.tp-rate {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1.1;
  min-width: 100%;
  color: rgba(83, 216, 251, 0.86);
  font-family: 'Courier New', monospace;
}
.tp-rate-num {
  font-size: 0.95rem;
  font-weight: bold;
  letter-spacing: 0.3px;
  color: rgba(83, 216, 251, 0.92);
}
.tp-rate-num.rate-low {
  color: #ff6b77;
}
.tp-rate-num.rate-high {
  color: #5be28f;
}
.tp-rate-num.rate-mid {
  color: rgba(83, 216, 251, 0.92);
}
.tp-rate-num.rate-unknown {
  color: rgba(225, 237, 255, 0.95);
}
.tp-rate-tag {
  margin-top: 2px;
  font-size: 0.56rem;
  font-weight: bold;
  color: rgba(214, 238, 98, 0.78);
  letter-spacing: 0.5px;
}
.tp-rate.chosen .tp-rate-num {
  text-shadow: 0 0 10px currentColor;
}
.tp-rate-scan {
  position: absolute;
  right: -22px;
  bottom: -34px;
  font-size: 2.8rem;
  line-height: 1;
  pointer-events: none;
  filter: drop-shadow(0 0 8px rgba(255, 236, 125, 0.8));
  animation: scanBlink .45s ease-in-out infinite alternate;
}
@keyframes scanBlink {
  from { opacity: 0.45; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1.06); }
}
.quick-btn {
  flex: 1;
  padding: 9px 0;
  border: 1px solid rgba(83, 216, 251, 0.25);
  border-radius: 9px;
  background: rgba(83, 216, 251, 0.06);
  color: rgba(83, 216, 251, 0.7);
  cursor: pointer;
  font-size: 1rem;
  font-weight: bold;
  letter-spacing: 1px;
  transition: all .18s;
}
.quick-btn:hover {
  background: rgba(83, 216, 251, 0.15);
  border-color: rgba(83, 216, 251, 0.6);
  color: #53d8fb;
}
.quick-btn.sel {
  background: rgba(83, 216, 251, 0.2);
  border-color: #53d8fb;
  color: #53d8fb;
  box-shadow: 0 0 10px rgba(83, 216, 251, 0.3);
}
.setup-panel {
  background: #16213e;
  border: 1px solid rgba(255, 255, 255, 0.13);
  border-radius: 18px;
  padding: 30px 30px 24px;
  text-align: center;
  width: min(680px, 95vw);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.65);
  animation: dlgPop .28s ease;
}
.setup-title {
  font-size: 1.02rem;
  color: rgba(255, 255, 255, 0.92);
  letter-spacing: 1.2px;
  margin-bottom: 8px;
  font-weight: bold;
}
.setup-msg {
  font-size: 0.8rem;
  color: rgba(255, 255, 255, 0.72);
  letter-spacing: 0.6px;
  margin-bottom: 10px;
  min-height: 20px;
}
.setup-subtitle {
  font-size: 0.78rem;
  color: rgba(83, 216, 251, 0.82);
  margin-bottom: 14px;
  letter-spacing: 0.8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}
.setup-lv-badge {
  font-size: 0.75rem;
  padding: 3px 10px;
  border: 1px solid currentColor;
}
.train-scale {
  position: relative;
  width: 100%;
  padding-top: 36px;
  padding-bottom: 84px;
  margin-bottom: 16px;
}
.train-track-bg,
.train-track-fill {
  position: absolute;
  top: 48px;
  left: 0;
  height: 16px;
  border-radius: 999px;
}
.train-track-bg {
  width: 100%;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.16);
}
.train-track-fill {
  width: 100%;
  background: linear-gradient(90deg, #ffffff, #e9f6ff);
  box-shadow: 0 0 14px rgba(255, 255, 255, 0.26);
  clip-path: inset(0 100% 0 0 round 999px);
  transition: clip-path .22s ease, background .22s ease, box-shadow .22s ease;
  pointer-events: none;
}
.setup-bubble {
  position: absolute;
  top: 0;
  left: 0;
  transform: translateX(-50%);
  min-width: 56px;
  height: 26px;
  padding: 0 8px;
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.6);
  background: rgba(255, 255, 255, 0.14);
  color: #ffffff;
  font-size: 0.78rem;
  font-weight: bold;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  letter-spacing: 0.6px;
  backdrop-filter: blur(3px);
  transition: left .18s ease, border-color .18s ease, box-shadow .18s ease;
}
.setup-range {
  position: absolute;
  top: 40px;
  left: 0;
  width: 100%;
  height: 32px;
  margin: 0;
  z-index: 3;
  background: transparent;
  appearance: none;
  -webkit-appearance: none;
}
.setup-range:focus { outline: none; }
.setup-range::-webkit-slider-runnable-track {
  height: 16px;
  background: transparent;
}
.setup-range::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  margin-top: -2px;
  border: 2px solid rgba(255, 255, 255, 0.85);
  background: radial-gradient(circle at 35% 30%, #ffffff, #93e7ff 58%, #53d8fb);
  box-shadow: 0 0 12px rgba(255, 255, 255, 0.45);
  cursor: pointer;
}
.setup-range::-moz-range-track {
  height: 16px;
  background: transparent;
  border: none;
}
.setup-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid rgba(255, 255, 255, 0.85);
  background: radial-gradient(circle at 35% 30%, #ffffff, #93e7ff 58%, #53d8fb);
  box-shadow: 0 0 12px rgba(255, 255, 255, 0.45);
  cursor: pointer;
}
.train-ends {
  position: absolute;
  left: 0;
  right: 0;
  top: 68px;
  display: flex;
  justify-content: space-between;
  font-size: 0.72rem;
  color: rgba(255, 255, 255, 0.5);
}
.train-marks {
  position: absolute;
  left: 0;
  right: 0;
  top: 90px;
  height: 26px;
  pointer-events: auto;
}
.train-mark {
  position: absolute;
  transform: translateX(-50%);
  top: 0;
  text-align: center;
  cursor: pointer;
}
.train-mark.start {
  transform: none;
  text-align: left;
}
.train-mark::before {
  content: '';
  position: absolute;
  top: -22px;
  left: 50%;
  width: 1px;
  height: 18px;
  background: rgba(255, 255, 255, 0.32);
}
.train-mark.start::before {
  left: 0;
}
.train-mark-label {
  font-size: 0.68rem;
  color: rgba(255, 255, 255, 0.66);
  white-space: nowrap;
  padding: 3px 7px;
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.07);
  border: 1px solid rgba(255, 255, 255, 0.12);
  cursor: pointer;
  user-select: none;
  transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease;
}
.train-mark:hover .train-mark-label {
  transform: translateY(-1px);
  border-color: rgba(255, 255, 255, 0.45);
  box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
}
.train-mark.passed .train-mark-label {
  color: rgba(255, 255, 255, 0.88);
}
.train-mark.active .train-mark-label {
  color: #ffffff;
  border: 1px solid rgba(255, 255, 255, 0.75);
  background: rgba(255, 255, 255, 0.18);
  box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
}
.train-add-btn {
  width: 100%;
  padding: 10px 0;
  border: 1px solid rgba(83, 216, 251, 0.5);
  border-radius: 10px;
  background: rgba(83, 216, 251, 0.12);
  color: #8fe9ff;
  font-size: 0.88rem;
  letter-spacing: 1px;
  cursor: pointer;
  font-weight: bold;
  margin-bottom: 12px;
  transition: all .16s ease;
  animation: trainBtnPulse 1.15s ease-in-out infinite;
}
.train-add-btn:hover {
  background: rgba(83, 216, 251, 0.2);
  border-color: rgba(83, 216, 251, 0.82);
  box-shadow: 0 0 12px rgba(83, 216, 251, 0.35);
}
.train-add-btn:disabled {
  cursor: not-allowed;
  color: rgba(160, 182, 198, 0.62);
  border-color: rgba(160, 182, 198, 0.36);
  background: rgba(120, 136, 150, 0.14);
  box-shadow: none;
  animation: none;
}
.rules-panel {
  background: #16213e;
  border: 1px solid rgba(255, 255, 255, 0.13);
  border-radius: 18px;
  padding: 30px 32px;
  text-align: center;
  width: min(1020px, 96vw);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.65);
  animation: dlgPop .28s ease;
}
.rules-wrap {
  margin-bottom: 20px;
  text-align: left;
}
.rules-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  align-items: stretch;
}
.rules-col {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 100%;
}
.rule-item {
  position: relative;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  padding: 36px 14px 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.rule-no {
  position: absolute;
  top: 8px;
  left: 8px;
  min-width: 28px;
  height: 28px;
  padding: 0 8px;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
  font-weight: bold;
  color: #53d8fb;
  border: 1px solid rgba(83, 216, 251, 0.58);
  background: rgba(83, 216, 251, 0.16);
  box-shadow: 0 0 10px rgba(83, 216, 251, 0.32);
}
.rule-title {
  font-size: 0.92rem;
  color: rgba(255, 255, 255, 0.78);
  line-height: 1.75;
  margin-bottom: 10px;
  padding-left: 32px;
}
.rules-head {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 14px;
}
.rules-head-title {
  font-size: 1.42rem;
  letter-spacing: 2px;
  color: rgba(255, 255, 255, 0.95);
  font-weight: bold;
}
.rules-pieces {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.rule-chip {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.35);
}
.rule-chip.p {
  background: radial-gradient(circle at 30% 28%, #d8b5b8, #c98f93 60%, #a87479);
  box-shadow: 0 0 8px rgba(169, 117, 122, 0.28);
}
.rule-chip.a {
  background: radial-gradient(circle at 30% 28%, #b8c4d0, #8ea3b7 60%, #6f8399);
  box-shadow: 0 0 8px rgba(111, 131, 153, 0.28);
}
.rule-plain {
  font-size: 0.76rem;
  color: rgba(255, 255, 255, 0.56);
  line-height: 1.7;
}
.fig-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.fig-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  min-width: 0;
}
.fig-tag {
  font-size: 0.82rem;
  color: rgba(255, 255, 255, 0.56);
  letter-spacing: 0.8px;
}
.fig-arrow {
  color: rgba(83, 216, 251, 0.85);
  font-size: 1rem;
  font-weight: bold;
}
.fig-board {
  --s: 20px;
  --g: 2px;
  display: grid;
  grid-template-columns: repeat(7, var(--s));
  grid-template-rows: repeat(6, var(--s));
  gap: var(--g);
  padding: 8px;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.12);
  width: max-content;
}
.fig-board.compact {
  --s: 17px;
}
.fig-row.win-row {
  flex-wrap: nowrap;
  justify-content: space-between;
  gap: 8px;
}
.fig-board.drop-hint {
  position: relative;
}
.fig-board.drop-hint::before {
  content: '↓';
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(83, 216, 251, 0.92);
  font-size: 1rem;
  font-weight: bold;
  text-shadow: 0 0 8px rgba(83, 216, 251, 0.65);
  animation: figDrop 1s ease-in-out infinite;
}
.fig-cell {
  width: var(--s);
  height: var(--s);
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.14);
  border: 1px solid rgba(255, 255, 255, 0.15);
}
.fig-cell.p {
  background: radial-gradient(circle at 30% 28%, #d8b5b8, #c98f93 60%, #a87479);
  border-color: rgba(168, 116, 121, 0.88);
}
.fig-cell.a {
  background: radial-gradient(circle at 30% 28%, #b8c4d0, #8ea3b7 60%, #6f8399);
  border-color: rgba(111, 131, 153, 0.88);
}
.fig-cell.h {
  box-shadow: 0 0 8px rgba(255, 215, 0, 0.75);
  border-color: rgba(255, 215, 0, 0.9);
}

.s-blink { animation: blink .85s step-start infinite; }
@keyframes blink { 50% { opacity: .22; } }
@keyframes figDrop {
  0% { transform: translate(-50%, -3px); opacity: 0.35; }
  55% { transform: translate(-50%, 4px); opacity: 1; }
  100% { transform: translate(-50%, 8px); opacity: 0.2; }
}
@keyframes trainBtnPulse {
  0% {
    box-shadow: 0 0 0 rgba(83, 216, 251, 0.18), 0 0 0 rgba(83, 216, 251, 0.08);
    filter: brightness(1);
  }
  50% {
    box-shadow: 0 0 18px rgba(83, 216, 251, 0.45), 0 0 34px rgba(83, 216, 251, 0.2);
    filter: brightness(1.08);
  }
  100% {
    box-shadow: 0 0 0 rgba(83, 216, 251, 0.18), 0 0 0 rgba(83, 216, 251, 0.08);
    filter: brightness(1);
  }
}
@keyframes dlgPop {
  from { transform: scale(.88) translateY(18px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

function initRuleBoards() {
  document.querySelectorAll('[data-rule-board]').forEach(el => {
    const raw = (el.getAttribute('data-rule-board') || '').trim().toLowerCase();
    let pattern = raw.replace(/[^.rbh]/g, '');
    if (pattern.length < ROWS * COLS) {
      pattern = pattern.padEnd(ROWS * COLS, '.');
    } else if (pattern.length > ROWS * COLS) {
      pattern = pattern.slice(0, ROWS * COLS);

    el.innerHTML = '';
    for (let i = 0; i < ROWS * COLS; i++) {
      const ch = pattern[i];
      const d = document.createElement('div');

      if (ch === 'r' || ch === 'h') cls += ' p';

function updateThinkBoardFrom(boardState, ratesByCol = {}, chosenCol = -1, winCells = [], scanCol = -1) {
  const cells = document.querySelectorAll('#tpBoard .tp-slot');
  if (cells.length !== ROWS * COLS) {
    initThinkBoard();
    return updateThinkBoardFrom(boardState, ratesByCol, chosenCol, winCells, scanCol);
  }

  const winSet = new Set(winCells.map(cell => `${cell.r}-${cell.c}`));
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const idx = r * COLS + c;
      const slot = cells[idx];
      const v = boardState[r][c];
      const key = `${r}-${c}`;
      const dropRow = getDropRowInState(boardState, c);
      const hasRate = typeof ratesByCol[c] !== 'undefined';
      const showRateHere = !v && dropRow === r && hasRate;
      const isChosen = showRateHere && c === chosenCol;
      const isScan = showRateHere && c === scanCol;

      let cls = 'tp-slot';
      if (isChosen) cls += ' rate-chosen';
      if (isScan) cls += ' rate-scan';
      if (slot.className !== cls) slot.className = cls;

      let html = '';
      if (v) {
        html = `<div class="tp-disc ${v === 'P' ? 'p' : 'a'}${winSet.has(key) ? ' win-disc' : ''}"></div>`;
      } else if (showRateHere) {
        const rateRaw = ratesByCol[c];
        const rateText = typeof rateRaw === 'number' ? `${rateRaw}%` : String(rateRaw);
        const rateClass = typeof rateRaw === 'number'
          ? (rateRaw < 20 ? ' rate-low' : (rateRaw > 80 ? ' rate-high' : ' rate-mid'))
          : ' rate-unknown';
        html = `<div class="tp-rate${isChosen ? ' chosen' : ''}">
          <div class="tp-rate-num${rateClass}">${rateText}</div>
        </div>`;
      }
      if (slot.innerHTML !== html) slot.innerHTML = html;
    }
  }
}

function mapGamesToVisualPercent(g) {
  const games = clampGames(g);
  for (let i = 0; i < TRAIN_VISUAL_ANCHORS.length - 1; i++) {
    const a = TRAIN_VISUAL_ANCHORS[i];
    const b = TRAIN_VISUAL_ANCHORS[i + 1];
    if (games <= b.games) {
      const span = Math.max(1, b.games - a.games);
      const t = (games - a.games) / span;
      return a.pos + (b.pos - a.pos) * t;
    }
  }
  return 100;
}

function mapVisualPercentToGames(p) {
  const pct = Math.max(0, Math.min(100, Number(p) || 0));
  for (let i = 0; i < TRAIN_VISUAL_ANCHORS.length - 1; i++) {
    const a = TRAIN_VISUAL_ANCHORS[i];
    const b = TRAIN_VISUAL_ANCHORS[i + 1];
    if (pct <= b.pos) {
      const span = Math.max(0.0001, b.pos - a.pos);
      const t = (pct - a.pos) / span;
      return clampGames(Math.round(a.games + (b.games - a.games) * t));
    }
  }
  return 999;
}

function getVisualPosByGames(g) {
  const found = TRAIN_VISUAL_ANCHORS.find(a => a.games === g);
  return found ? found.pos : mapGamesToVisualPercent(g);
}

function getSetupVisualBounds() {
  const min = mapGamesToVisualPercent(setupMinGames);
  const max = mapGamesToVisualPercent(setupMaxGames);
  if (max <= min) return { min: 0, max: 100 };
  return { min, max };
}

function mapGlobalPctToSetupPct(globalPct) {
  const { min, max } = getSetupVisualBounds();
  return clampInt(((globalPct - min) / (max - min)) * 100, 0, 100);
}

function mapSetupPctToGlobalPct(setupPct) {
  const { min, max } = getSetupVisualBounds();
  const pct = Math.max(0, Math.min(100, Number(setupPct) || 0));
  return min + ((max - min) * pct / 100);
}

function getSetupPosByGames(g) {
  return mapGlobalPctToSetupPct(mapGamesToVisualPercent(clampGames(g)));
}

function jumpSetupToGames(games) {
  updateSetupUI(clampSetupGames(games));
}

function buildGlobalProgressGradient() {
  const p10 = getVisualPosByGames(10);
  const p200 = getVisualPosByGames(200);
  const p600 = getVisualPosByGames(600);
  const pEarly = Math.max(2, Math.round(p10 * 0.5));
  return `linear-gradient(90deg,
    #ffffff 0%,
    #f3faff ${pEarly}%,
    #d9ecff ${p10}%,
    #abd4ff ${p200}%,
    #6eaef2 ${p600}%,
    #143f9b 100%)`;
}

function buildSetupProgressGradient() {
  const p10 = mapGlobalPctToSetupPct(getVisualPosByGames(10));
  const p200 = mapGlobalPctToSetupPct(getVisualPosByGames(200));
  const p600 = mapGlobalPctToSetupPct(getVisualPosByGames(600));
  const pEarly = Math.max(2, Math.round(p10 * 0.5));
  return `linear-gradient(90deg,
    #ffffff 0%,
    #f3faff ${pEarly}%,
    #d9ecff ${p10}%,
    #abd4ff ${p200}%,
    #6eaef2 ${p600}%,
    #143f9b 100%)`;
}

function hexToRgb(hex) {
  const h = hex.replace('#', '');
  const full = h.length === 3 ? h.split('').map(ch => ch + ch).join('') : h;
  const n = parseInt(full, 16);
  return {
    r: (n >> 16) & 255,
    g: (n >> 8) & 255,
    b: n & 255
  };
}

function lerp(a, b, t) {
  return Math.round(a + (b - a) * t);
}

function getToneByGames(games) {
  const t = clampGames(games) / 999;
  const a = hexToRgb(TRAIN_TONE_START);
  const b = hexToRgb(TRAIN_TONE_END);
  const r = lerp(a.r, b.r, t);
  const g = lerp(a.g, b.g, t);
  const bl = lerp(a.b, b.b, t);
  return {
    color: `rgb(${r}, ${g}, ${bl})`,
    glow: `rgba(${r}, ${g}, ${bl}, 0.45)`
  };
}

function initSetupMarks() {
  const marks = document.getElementById('trainMarks');
  if (!marks) return;
  const stageKey = `${setupMinGames}-${setupMaxGames}`;
  if (marks.dataset.stageKey === stageKey) return;
  marks.innerHTML = '';
  for (let i = 0; i < LEVELS.length; i++) {
    const lv = LEVELS[i];
    if (lv.min < setupMinGames || lv.min > setupMaxGames) continue;
    const mark = document.createElement('div');
    mark.className = 'train-mark' + (i === 0 ? ' start' : '');
    mark.dataset.lvIdx = String(i);
    mark.style.left = `${getSetupPosByGames(lv.min)}%`;
    mark.setAttribute('role', 'button');
    mark.tabIndex = 0;
    mark.title = `跳转到${lv.name}`;
    mark.innerHTML = `<div class="train-mark-label">${lv.name}</div>`;
    mark.addEventListener('click', () => jumpSetupToGames(lv.min));
    mark.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        jumpSetupToGames(lv.min);
      }
    });
    marks.appendChild(mark);
  }
  marks.dataset.stageKey = stageKey;
}

function updateSetupUI(v) {
  const games = clampSetupGames(v);
  setupDraftGames = games;
  const lvIdx = getLvIdx(games);
  const lv = LEVELS[lvIdx];
  const visualPct = mapGamesToVisualPercent(games);
  const setupPct = mapGlobalPctToSetupPct(visualPct);
  const range = document.getElementById('setupRange');
  if (range) range.value = String(setupPct);

  const fill = document.getElementById('trainTrackFill');
  if (fill) {
    const tone = getToneByGames(games);
    fill.style.clipPath = `inset(0 ${100 - setupPct}% 0 0 round 999px)`;
    fill.style.background = buildSetupProgressGradient();
    fill.style.boxShadow = `0 0 14px ${tone.glow}`;
  }

  const gamesText = document.getElementById('setupGamesVal');
  if (gamesText) gamesText.textContent = String(games);
  const lvBadge = document.getElementById('setupLvBadge');
  if (lvBadge) {
    lvBadge.textContent = lv.name;
    lvBadge.className = `badge ${lv.cls} setup-lv-badge`;
  }
  const bubble = document.getElementById('setupBubble');
  if (bubble) {
    const tone = getToneByGames(games);
    bubble.textContent = `${games}局`;
    bubble.style.left = `${setupPct}%`;
    bubble.style.boxShadow = `0 0 10px ${tone.glow}`;
    bubble.style.borderColor = 'rgba(255,255,255,0.72)';
    if (setupPct <= 4) bubble.style.transform = 'translateX(0)';
    else if (setupPct >= 96) bubble.style.transform = 'translateX(-100%)';
    else bubble.style.transform = 'translateX(-50%)';
  }

  document.querySelectorAll('#trainMarks .train-mark').forEach(el => {
    const idx = parseInt(el.dataset.lvIdx || '-1', 10);
    const label = el.querySelector('.train-mark-label');
    el.classList.toggle('active', idx === lvIdx);
    if (!label) return;
    if (idx === lvIdx) {
      const c = LEVEL_ACCENT_COLORS[lvIdx] || '#53d8fb';
      label.style.color = c;
      label.style.borderColor = c;
      label.style.background = 'rgba(255,255,255,0.14)';
      label.style.boxShadow = `0 0 8px ${c}`;
    } else {
      label.style.color = 'rgba(255,255,255,0.66)';
      label.style.borderColor = 'rgba(255,255,255,0.12)';
      label.style.background = 'rgba(255,255,255,0.07)';
      label.style.boxShadow = 'none';
    }
  });

  refreshTrainAddBtn(games);
}

function startFromSetup() {
  const v = clampGames(setupDraftGames);
  const pendingStage = getPendingSetupStage();
  const stageUsed = Math.max(setupStage, pendingStage);
  const shouldShowRound1Hint =
    !preHintShownRound1 && (stageUsed === 1 || (guidedGameCount >= 1 && guidedSetupDoneStage < 1));
  const shouldShowRound2Hint =
    !preHintShownRound2 && (stageUsed === 2 || (guidedGameCount >= 2 && guidedSetupDoneStage < 2));

  if (shouldShowRound1Hint) {
    preHintShownRound1 = true;
    document.getElementById('setupOverlay').style.display = 'none';
    showPreStartHint(`经过${v}局的训练，AI已经可以初步计算胜率`, () => finishStartFromSetup(v, stageUsed));
    return;
  }
  if (shouldShowRound2Hint) {
    preHintShownRound2 = true;
    document.getElementById('setupOverlay').style.display = 'none';
    showPreStartHint(`经过${v}局的训练，AI已经可以非常精确地计算胜率，并且预判推演棋局`, () => finishStartFromSetup(v, stageUsed));
    return;
  }
  finishStartFromSetup(v, stageUsed);
}

function getDropRow(col) {
  for (let r = ROWS - 1; r >= 0; r--) {
    if (!board[r][col]) return r;
  }
  return -1;
}

function getPlayableCols() {
  const cols = [];
  for (let c = 0; c < COLS; c++) {
    if (getDropRow(c) !== -1) cols.push(c);
  }
  return cols;
}

/* === AI === */
// 决策函数：仅负责选择落子列，不读取展示胜率数字。
function decideAIMoveByLevel(state, games) {
  const playable = getPlayableColsInState(state);
  if (!playable.length) return -1;

  // 第一档：萌新（0-19局）完全随机。
  if (games < 20) {
    return pickRandom(playable);
  }

  // 第二档：见习（20-99局）——只会赢棋，否则随机。
  if (games < 100) {
    return chooseApprenticeMove(state);
  }

  // 熟练及以上：先赢棋。
  const winningCols = playable.filter(col => isImmediateWinCol(state, col, 'A'));
  if (winningCols.length) return pickRandom(winningCols);

  // 第三档：熟练（100-199）——赢棋 + 堵棋 + 前两步防送杀，其余随机。
  if (games < 200) {
    return chooseSkilledMove(state);
  }

  // 第四到第六档：在前置规则基础上，使用不同强度 minimax。
  return chooseMinimaxMove(state, games);
}

function chooseApprenticeMove(state) {
  const playable = getPlayableColsInState(state);
  const winningCols = playable.filter(col => isImmediateWinCol(state, col, 'A'));
  if (winningCols.length) return pickRandom(winningCols);
  return pickRandom(playable);
}

function getEarlyAntiForkSafeCols(state, candidates) {
  const playable = getPlayableColsInState(state);
  let cols = candidates && candidates.length ? candidates.slice() : playable.slice();
  const aiCount = countPiecesInState(state, 'A');
  if (aiCount < 2) {
    const antiForkSafe = cols.filter(col => {
      const next = cloneBoardState(state);
      applyDropInState(next, col, 'A');
      return getForkThreatInfo(next, 'P').maxThreatWins < 2;
    });
    if (antiForkSafe.length) cols = antiForkSafe;
  }
  return cols;
}

function chooseSkilledMove(state) {
  const playable = getPlayableColsInState(state);
  const blockingCols = playable.filter(col => isImmediateWinCol(state, col, 'P'));
  if (blockingCols.length) return pickRandom(blockingCols);

  let candidates = getEarlyAntiForkSafeCols(state, playable);
  return pickRandom(candidates);
}

function chooseMinimaxMove(state, games) {
  const playable = getPlayableColsInState(state);
  const blockingCols = playable.filter(col => isImmediateWinCol(state, col, 'P'));
  if (blockingCols.length) return pickRandom(blockingCols);

  let candidates = getEarlyAntiForkSafeCols(state, playable);
  if (!candidates.length) candidates = playable.slice();

  const lvIdx = getLvIdx(games);
  const profile = getMinimaxProfileByLevel(lvIdx);

  const orderedMoves = orderMovesByCenter(candidates);
  const scored = orderedMoves.map(col => {
    const next = cloneBoardState(state);
    applyDropInState(next, col, 'A');
    const score = minimaxAB(next, profile.depth - 1, -Infinity, Infinity, false, 1);
    return { col, score };
  });
  scored.sort((a, b) => b.score - a.score);
  return pickByLevelStrength(scored, lvIdx);
}

function getMinimaxProfileByLevel(lvIdx) {
  // lv2=熟练, lv3=精通, lv4=大师, lv5=传说
  if (lvIdx <= 2) return { depth: 2 };
  if (lvIdx === 3) return { depth: 2 };
  if (lvIdx === 4) return { depth: 3 };
  return { depth: 5 };
}

function pickByLevelStrength(scored, lvIdx) {
  if (!scored.length) return -1;
  if (scored.length === 1) return scored[0].col;

  const top = scored.slice(0, Math.min(3, scored.length));
  const rollsByLv = {
    2: [0.58, 0.30, 0.12], // 熟练
    3: [0.62, 0.33, 0.05], // 精通：基本下在最高或第二高
    4: [0.78, 0.20, 0.02], // 大师
    5: [0.92, 0.08, 0.00]  // 传说
  };
  const probs = rollsByLv[lvIdx] || rollsByLv[2];
  const p1 = probs[0];
  const p2 = probs[1];
  const r = Math.random();
  if (r < p1) return top[0].col;
  if (r < p1 + p2) return top[Math.min(1, top.length - 1)].col;
  return top[Math.min(2, top.length - 1)].col;
}

function orderMovesByCenter(cols) {
  const pref = [3, 2, 4, 1, 5, 0, 6];
  const set = new Set(cols);
  return pref.filter(c => set.has(c));
}

function minimaxAB(state, depth, alpha, beta, isMax, ply) {
  if (checkWinInState(state, 'A')) return 100000 - ply * 20;
  if (checkWinInState(state, 'P')) return -100000 + ply * 20;

  const playable = getPlayableColsInState(state);
  if (!playable.length) return 0;
  if (depth <= 0) return evaluateMinimaxState(state);

  const ordered = orderMovesByCenter(playable);
  if (isMax) {
    let best = -Infinity;
    for (const col of ordered) {
      const next = cloneBoardState(state);
      applyDropInState(next, col, 'A');
      const val = minimaxAB(next, depth - 1, alpha, beta, false, ply + 1);
      if (val > best) best = val;
      if (val > alpha) alpha = val;
      if (beta <= alpha) break;
    }
    return best;
  }

  let best = Infinity;
  for (const col of ordered) {
    const next = cloneBoardState(state);
    applyDropInState(next, col, 'P');
    const val = minimaxAB(next, depth - 1, alpha, beta, true, ply + 1);
    if (val < best) best = val;
    if (val < beta) beta = val;
    if (beta <= alpha) break;
  }
  return best;
}

function evaluateMinimaxState(state) {
  const centerA = countPiecesInColumn(state, 3, 'A');
  const centerP = countPiecesInColumn(state, 3, 'P');
  let score = (centerA - centerP) * 8;
  score += evaluateBoardWindows(state, 'A') * 12;
  score -= evaluateBoardWindows(state, 'P') * 14;
  return score;
}

function shouldAvoidEarlyCenterStack(state) {
  if (!playerFirst) return false;
  const aiCount = countPiecesInState(state, 'A');
  const pCount = countPiecesInState(state, 'P');
  if (aiCount !== 1 || pCount !== 2) return false;
  if (getDropRowInState(state, 3) === -1) return false;
  return countPiecesInColumn(state, 3, 'A') >= 1;
}

function countPiecesInState(state, sym) {
  let n = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (state[r][c] === sym) n++;
    }
  }
  return n;
}

function countPiecesInColumn(state, col, sym) {
  let n = 0;
  for (let r = 0; r < ROWS; r++) {
    if (state[r][col] === sym) n++;
  }
  return n;
}

function getImmediateWinCols(state, sym) {
  const playable = getPlayableColsInState(state);
  return playable.filter(col => isImmediateWinCol(state, col, sym));
}

function getForkThreatInfo(state, sym) {
  const playable = getPlayableColsInState(state);
  let maxThreatWins = 0;
  let forkMoves = 0;

  for (const col of playable) {
    const next = cloneBoardState(state);
    const moved = applyDropInState(next, col, sym);
    if (!moved) continue;

    if (checkWinInState(next, sym)) {
      maxThreatWins = Math.max(maxThreatWins, 3);
      forkMoves++;
      continue;
    }

    const immediateWins = getImmediateWinCols(next, sym).length;
    if (immediateWins > maxThreatWins) maxThreatWins = immediateWins;
    if (immediateWins >= 2) forkMoves++;
  }

  return { maxThreatWins, forkMoves };
}

function evaluateBoardWindows(state, sym) {
  let score = 0;
  const dirs = [
    [0, 1],
    [1, 0],
    [1, 1],
    [1, -1]
  ];

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      for (const [dr, dc] of dirs) {
        const er = r + dr * 3;
        const ec = c + dc * 3;
        if (er < 0 || er >= ROWS || ec < 0 || ec >= COLS) continue;

        const window = [];
        for (let k = 0; k < 4; k++) {
          window.push(state[r + dr * k][c + dc * k]);
        }
        score += scoreWindow(window, sym);
      }
    }
  }
  return score;
}

function scoreWindow(window, sym) {
  const opp = sym === 'A' ? 'P' : 'A';
  let own = 0;
  let other = 0;
  let empty = 0;

  for (const cell of window) {
    if (cell === sym) own++;
    else if (cell === opp) other++;
    else empty++;
  }

  if (own > 0 && other > 0) return 0;
  if (own === 3 && empty === 1) return 12;
  if (own === 2 && empty === 2) return 3;
  if (own === 1 && empty === 3) return 1;
  return 0;
}

function clampInt(v, min, max) {
  return Math.max(min, Math.min(max, Math.round(v)));
}

function isBoardStateEmpty(state) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (state[r][c]) return false;
    }
  }
  return true;
}

// 仅展示层处理：空棋盘时让镜像列(1=7,2=6,3=5)显示一致。
function applyMirrorRatesOnEmptyBoard(state, ratesByCol) {
  if (!isBoardStateEmpty(state)) return ratesByCol;
  const mirrorPairs = [[0, 6], [1, 5], [2, 4]];
  for (const [l, r] of mirrorPairs) {
    if (typeof ratesByCol[l] === 'undefined' || typeof ratesByCol[r] === 'undefined') continue;
    const lv = ratesByCol[l];
    const rv = ratesByCol[r];
    if (typeof lv === 'number' && typeof rv === 'number') {
      const v = clampInt((lv + rv) / 2, 0, 99);
      ratesByCol[l] = v;
      ratesByCol[r] = v;
    } else {
      const v = typeof lv === 'string' ? lv : String(rv);
      ratesByCol[l] = v;
      ratesByCol[r] = v;
    }
  }
  return ratesByCol;
}

function getRateByScoreBand(score, minScore, maxScore) {
  if (!Number.isFinite(score) || !Number.isFinite(minScore) || !Number.isFinite(maxScore)) {
    return randInt(38, 62);
  }
  if (maxScore <= minScore) return randInt(46, 58);
  const t = (score - minScore) / (maxScore - minScore);
  return clampInt(18 + t * 74 + randInt(-4, 4), 10, 95);
}

function mapScoreToRate(score, minScore, maxScore, low = 18, high = 92) {
  if (!Number.isFinite(score) || !Number.isFinite(minScore) || !Number.isFinite(maxScore)) {
    return clampInt((low + high) / 2, 1, 99);
  }
  if (maxScore <= minScore) return clampInt((low + high) / 2, 1, 99);
  const t = (score - minScore) / (maxScore - minScore);
  return clampInt(low + t * (high - low), 1, 99);
}

function checkWinInStateByDirs(state, sym, dirs) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (state[r][c] !== sym) continue;
      for (const [dr, dc] of dirs) {
        let ok = true;
        for (let k = 1; k < 4; k++) {
          const nr = r + dr * k;
          const nc = c + dc * k;
          if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS || state[nr][nc] !== sym) {
            ok = false;
            break;
          }
        }
        if (ok) return true;
      }
    }
  }
  return false;
}

function isImmediateWinColByDirs(state, col, sym, dirs) {
  const next = cloneBoardState(state);
  const moved = applyDropInState(next, col, sym);
  if (!moved) return false;
  return checkWinInStateByDirs(next, sym, dirs);
}

function getImmediateWinColsByDirs(state, sym, dirs) {
  const playable = getPlayableColsInState(state);
  return playable.filter(col => isImmediateWinColByDirs(state, col, sym, dirs));
}

function applyEarlyDefenseBias(ratesByCol, state, playable, bias) {
  const aiCount = countPiecesInState(state, 'A');
  if (aiCount >= 2) return;
  const safeCols = getEarlyAntiForkSafeCols(state, playable);
  if (!safeCols.length || safeCols.length === playable.length) return;
  const safeSet = new Set(safeCols);
  for (const col of playable) {
    if (typeof ratesByCol[col] !== 'number') continue;
    ratesByCol[col] = clampInt(ratesByCol[col] + (safeSet.has(col) ? bias : -bias), 1, 99);
  }
}

// 胜率评估函数：同时用于展示与“选最高胜率列”的决策。
function buildAIRatesForDisplay(state, games, chosenCol) {
  const ratesByCol = {};
  const playable = getPlayableColsInState(state);
  const DIRS_HV = [[0, 1], [1, 0]];
  const DIRS_DIAG = [[1, 1], [1, -1]];
  const DIRS_ALL = [[0, 1], [1, 0], [1, 1], [1, -1]];

  // 萌新阶段不显示胜率数字（仅展示，不影响决策）。
  if (games < 20) {
    for (const col of playable) ratesByCol[col] = '';
    return applyMirrorRatesOnEmptyBoard(state, ratesByCol);
  }

  // 见习（20-99）：
  // 完全随机为主 + 横/竖可赢则赢 + 前两步防守 + 40%概率堵“连三将成四”。
  if (games < 100) {
    for (const col of playable) {
      ratesByCol[col] = randInt(35, 65);
    }
    const hvWinCols = getImmediateWinColsByDirs(state, 'A', DIRS_HV);
    for (const col of hvWinCols) ratesByCol[col] = randInt(95, 99);
    applyEarlyDefenseBias(ratesByCol, state, playable, 18);

    if (Math.random() < 0.4) {
      const blockCols = getImmediateWinCols(state, 'P');
      for (const col of blockCols) {
        ratesByCol[col] = Math.max(ratesByCol[col] || 0, randInt(88, 96));
      }
    }
    return applyMirrorRatesOnEmptyBoard(state, ratesByCol);
  }

  // 熟练（100-199）：
  // 横/竖可赢则赢 + 横/竖要输则堵 + 前两步防守 + 其余随机；
  // 额外 50% 概率会堵斜线连三将成四。
  if (games < 200) {
    for (const col of playable) {
      ratesByCol[col] = randInt(34, 68);
    }
    const hvWinCols = getImmediateWinColsByDirs(state, 'A', DIRS_HV);
    for (const col of hvWinCols) ratesByCol[col] = randInt(96, 99);

    const hvBlockCols = getImmediateWinColsByDirs(state, 'P', DIRS_HV);
    for (const col of hvBlockCols) {
      ratesByCol[col] = Math.max(ratesByCol[col] || 0, randInt(90, 97));
    }

    if (Math.random() < 0.5) {
      const diagBlockCols = getImmediateWinColsByDirs(state, 'P', DIRS_DIAG);
      for (const col of diagBlockCols) {
        ratesByCol[col] = Math.max(ratesByCol[col] || 0, randInt(86, 94));
      }
    }

    applyEarlyDefenseBias(ratesByCol, state, playable, 16);
    return applyMirrorRatesOnEmptyBoard(state, ratesByCol);
  }

  // 精通（200-499）：
  // 任意方向赢/堵 + 前两步防守 + 其余随机。
  if (games < 500) {
    for (const col of playable) {
      ratesByCol[col] = randInt(36, 70);
    }
    const winCols = getImmediateWinColsByDirs(state, 'A', DIRS_ALL);
    const blockCols = getImmediateWinColsByDirs(state, 'P', DIRS_ALL);
    for (const col of winCols) ratesByCol[col] = 100;
    for (const col of blockCols) ratesByCol[col] = Math.max(ratesByCol[col] || 0, randInt(92, 98));
    applyEarlyDefenseBias(ratesByCol, state, playable, 14);
    return applyMirrorRatesOnEmptyBoard(state, ratesByCol);
  }

  // 大师/传说：在精通基础上使用非随机 minimax。
  // 大师推荐 depth=4；传说使用更强 depth=5。
  const lvIdx = getLvIdx(games);
  const depth = lvIdx >= 5 ? 5 : 4;
  const scored = [];
  for (const col of playable) {
    if (isImmediateWinColByDirs(state, col, 'A', DIRS_ALL)) {
      scored.push({ col, score: 1e9, forced: 'win' });
      continue;
    }
    const next = cloneBoardState(state);
    applyDropInState(next, col, 'A');
    if (hasOpponentImmediateWin(next, 'P')) {
      scored.push({ col, score: -1e9, forced: 'lose' });
      continue;
    }
    scored.push({
      col,
      score: minimaxAB(next, depth - 1, -Infinity, Infinity, false, 1),
      forced: ''
    });
  }

  const regular = scored.filter(x => !x.forced);
  const minScore = regular.length ? Math.min(...regular.map(x => x.score)) : 0;
  const maxScore = regular.length ? Math.max(...regular.map(x => x.score)) : 0;

  for (const item of scored) {
    if (item.forced === 'win') {
      ratesByCol[item.col] = 100;
    } else if (item.forced === 'lose') {
      ratesByCol[item.col] = 2;
    } else {
      ratesByCol[item.col] = mapScoreToRate(item.score, minScore, maxScore, 18, 92);
    }
  }

  return applyMirrorRatesOnEmptyBoard(state, ratesByCol);
}

// 决策规则：总是选择“当前评估胜率”最高的列。
// 不同等级的“判断不准确”体现在 buildAIRatesForDisplay 的评估质量差异里。
function pickBestColByRates(state, ratesByCol, games) {
  const playable = getPlayableColsInState(state);
  if (!playable.length) return -1;

  // 萌新阶段展示为"?"，无法按数字比较，保持随机体感。
  if (games < 20) return pickRandom(playable);

  let maxRate = -Infinity;
  let bestCols = [];
  for (const col of playable) {
    const v = ratesByCol[col];
    if (typeof v !== 'number') continue;
    if (v > maxRate) {
      maxRate = v;
      bestCols = [col];
    } else if (v === maxRate) {
      bestCols.push(col);
    }
  }

  if (!bestCols.length) return pickRandom(playable);
  return orderMovesByCenter(bestCols)[0];
}

function randInt(min, max) {
  return min + Math.floor(Math.random() * (max - min + 1));
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function cloneBoardState(state) {
  return state.map(row => row.slice());
}

function getDropRowInState(state, col) {
  for (let r = ROWS - 1; r >= 0; r--) {
    if (!state[r][col]) return r;
  }
  return -1;
}

function getPlayableColsInState(state) {
  const cols = [];
  for (let c = 0; c < COLS; c++) {
    if (getDropRowInState(state, c) !== -1) cols.push(c);
  }
  return cols;
}

function applyDropInState(state, col, sym) {
  const row = getDropRowInState(state, col);
  if (row === -1) return null;
  state[row][col] = sym;
  return { r: row, c: col };
}

function checkWinInState(state, sym) {
  const dirs = [
    [0, 1],
    [1, 0],
    [1, 1],
    [1, -1]
  ];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (state[r][c] !== sym) continue;
      let ok = false;
      for (const [dr, dc] of dirs) {
        ok = true;
        for (let k = 1; k < 4; k++) {
          const nr = r + dr * k;
          const nc = c + dc * k;
          if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS || state[nr][nc] !== sym) {
            ok = false;
            break;
          }
        }
        if (ok) return true;
      }
    }
  }
  return false;
}

function isImmediateWinCol(state, col, sym) {
  const next = cloneBoardState(state);
  const moved = applyDropInState(next, col, sym);
  if (!moved) return false;
  return checkWinInState(next, sym);
}

function hasOpponentImmediateWin(state, oppSym) {
  const playable = getPlayableColsInState(state);
  for (const col of playable) {
    if (isImmediateWinCol(state, col, oppSym)) return true;
  }
  return false;
}

function isDraw() {
  for (let c = 0; c < COLS; c++) {
    if (!board[0][c]) return false;
  }
  return true;
}

function checkWin(sym) {
  const dirs = [
    [0, 1],
    [1, 0],
    [1, 1],
    [1, -1]
  ];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c] !== sym) continue;
      for (const [dr, dc] of dirs) {
        const cells = [{ r, c }];
        let ok = true;
        for (let k = 1; k < 4; k++) {
          const nr = r + dr * k;
          const nc = c + dc * k;
          if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS || board[nr][nc] !== sym) {
            ok = false;
            break;
          }
          cells.push({ r: nr, c: nc });
        }
        if (ok) return cells;
      }
    }
  }
  return null;
}

function renderDropRow() {
  const rowEl = document.getElementById('dropRow');
  rowEl.innerHTML = '';
  for (let c = 0; c < COLS; c++) {
    const full = getDropRow(c) === -1;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'drop-btn';
    btn.textContent = '▼';
    btn.disabled = over || turn !== 'player' || full;
    btn.addEventListener('mouseenter', () => setHoverCol(c));
    btn.addEventListener('mouseleave', () => clearHoverCol(c));
    btn.addEventListener('click', () => onColClick(c));
    rowEl.appendChild(btn);
  }
}

function refreshBoardTurnState() {
  const boardEl = document.getElementById('board');
  if (boardEl) boardEl.classList.toggle('player-turn', !over && turn === 'player');
  renderDropRow();
  updateDropFocus();
}

function setHoverCol(col) {
  hoverCol = col;
  updateDropFocus();
}

function clearHoverCol(col) {
  if (hoverCol === col) {
    hoverCol = -1;
    updateDropFocus();
  }
}

function updateDropFocus() {
  document.querySelectorAll('#board .slot.drop-focus').forEach(el => el.classList.remove('drop-focus'));
  if (over || turn !== 'player' || hoverCol < 0) return;
  const dropRow = getDropRow(hoverCol);
  if (dropRow === -1) return;
  const target = document.querySelector(`#board .slot[data-row="${dropRow}"][data-col="${hoverCol}"]`);
  if (target) target.classList.add('drop-focus');
}

function renderBoard(winCells = [], newDisc = null) {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  boardEl.classList.toggle('player-turn', !over && turn === 'player');
  renderDropRow();

  const winSet = new Set(winCells.map(cell => `${cell.r}-${cell.c}`));
  const dropBase = 72;

  for (let c = 0; c < COLS; c++) {
    const colEl = document.createElement('div');
    const full = getDropRow(c) === -1;
    colEl.className = 'col' + (full ? ' full' : '');
    colEl.addEventListener('mouseenter', () => setHoverCol(c));
    colEl.addEventListener('mouseleave', () => clearHoverCol(c));
    colEl.addEventListener('click', () => onColClick(c));

    for (let r = 0; r < ROWS; r++) {
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.dataset.row = r;
      slot.dataset.col = c;
      const v = board[r][c];
      if (v) {
        const d = document.createElement('div');
        const isWin = winSet.has(`${r}-${c}`);
        d.className = 'disc ' + (v === 'P' ? 'p' : 'a') + (isWin ? ' win-disc' : '');
        if (newDisc && newDisc.r === r && newDisc.c === c) {
          d.className += ' new';
          d.style.setProperty('--drop-distance', `${(r + 1) * dropBase}px`);
        }
        slot.appendChild(d);
      }
      colEl.appendChild(slot);
    }
    boardEl.appendChild(colEl);
  }
  updateDropFocus();
}

function placeDisc(col, sym) {
  const row = getDropRow(col);
  if (row === -1) return null;
  board[row][col] = sym;
  lastMove = { r: row, c: col, sym };
  return { r: row, c: col };
}

function newGame() {
  closeDialog();
  gameId++;
  tpStopLoading();
  board = createBoard();
  over = false;
  lastMove = null;
  hoverCol = -1;
  turn = playerFirst ? 'player' : 'ai';
  syncPracInputLock();
  renderBoard();
  updateThinkBoard();

  if (playerFirst) {
    setStatus('🎮', '轮到你了，请落子');
    tpSetIdle('等待玩家落子...');
  } else {
    setStatus('🤖', '电脑思考中...', true);
    tpSetIdle('电脑将先手...');
    scheduleAI(350);
  }
}

function onColClick(col) {
  if (over || turn !== 'player') return;
  if (getDropRow(col) === -1) return;

  const move = placeDisc(col, 'P');
  if (!move) return;
  renderBoard([], move);
  tpSetIdle('玩家落子，等待电脑...');

  const pWin = checkWin('P');
  if (pWin) {
    endGame({ winner: 'player', line: pWin });
    return;
  }
  if (isDraw()) {
    endGame({ winner: 'draw', line: [] });
    return;
  }

  turn = 'ai';
  refreshBoardTurnState();
  setStatus('🤖', '电脑思考中...', true);
  scheduleAI(180);
}

function getRateScanCols(boardState, ratesByCol) {
  const cols = [];
  for (let c = 0; c < COLS; c++) {
    if (getDropRowInState(boardState, c) === -1) continue;
    // 仅扫描有明确数字胜率的列；萌新阶段为空字符串，不参与扫描动画。
    if (typeof ratesByCol[c] !== 'number') continue;
    cols.push(c);
  }
  return cols.sort((a, b) => a - b);
}

async function playRateScan(boardState, ratesByCol, chosenCol, g, seq) {
  const cols = getRateScanCols(boardState, ratesByCol);
  if (!cols.length) return;

  for (const c of cols) {
    if (over || g !== gameId || seq !== aiThinkSeq) return;
    updateThinkBoardFrom(boardState, ratesByCol, -1, [], c);
    await delay(90);
  }

  if (over || g !== gameId || seq !== aiThinkSeq) return;
  updateThinkBoardFrom(boardState, ratesByCol, chosenCol, [], chosenCol);
  await delay(160);
}

async function runAI(g, seq) {
  if (over || g !== gameId || seq !== aiThinkSeq) return;
  const empty = getPlayableCols();
  if (!empty.length) return;

  const isNovice = stats.games < 20;
  const thinkMsgs = isNovice ? THINK_MSGS_NOVICE : THINK_MSGS;
  const ratesByCol = buildAIRatesForDisplay(board, stats.games, -1);
  const col = pickBestColByRates(board, ratesByCol, stats.games);
  if (col === -1) return;
  const shownRate = typeof ratesByCol[col] === 'number' ? `${ratesByCol[col]}%` : '';
  const snap = cloneBoardState(board);
  const resultHtml = isNovice
    ? `→ 先下第 ${col + 1} 列<br>（这步先碰碰运气）`
    : `→ 落子第 ${col + 1} 列<br>（展示胜率 ${shownRate}）`;

  updateThinkBoardFrom(snap, {}, -1);
  tpSetLoading();
  appendLogLine(thinkMsgs[0]);
  await delay(700);
  if (over || g !== gameId || seq !== aiThinkSeq) return;

  appendLogLine(thinkMsgs[1]);
  updateThinkBoardFrom(snap, ratesByCol, -1);
  await delay(220);
  if (over || g !== gameId || seq !== aiThinkSeq) return;
  if (!isNovice) {
    await playRateScan(snap, ratesByCol, col, g, seq);
  }
  if (over || g !== gameId || seq !== aiThinkSeq) return;

  appendLogLine(thinkMsgs[2]);
  updateThinkBoardFrom(snap, ratesByCol, col, [], -1);
  await delay(420);
  if (over || g !== gameId || seq !== aiThinkSeq) return;

  tpStopLoading();
  tpSetResult(col, resultHtml, ratesByCol, snap);
  await delay(400);
  if (over || g !== gameId || seq !== aiThinkSeq) return;

  await delay(500);
  if (over || g !== gameId || seq !== aiThinkSeq) return;

  const move = placeDisc(col, 'A');
  if (!move) return;
  renderBoard([], move);

  const aWin = checkWin('A');
  if (aWin) {
    endGame({ winner: 'ai', line: aWin });
    return;
  }
  if (isDraw()) {
    endGame({ winner: 'draw', line: [] });
    return;
  }

  turn = 'player';
  refreshBoardTurnState();
  setStatus('🎮', '轮到你了，请落子');
  updateThinkBoardFrom(snap, ratesByCol, col);
  tpUpsertResult(resultHtml);
}

function endGame(result) {
  over = true;
  syncPracInputLock();
  tpStopLoading();
  guidedGameCount++;
  stats.games++;
  pracGames = stats.games;
  document.getElementById('pracInput').value = pracGames;
  saveStats(stats);
  refreshAIStatus(stats.games);

  renderBoard(result.line);

  let emoji = '🤝';
  let title = '平局';
  if (result.winner === 'player') {
    emoji = '🏆';
    title = '你赢了';
    setStatus('🏆', '你赢了！');
  } else if (result.winner === 'ai') {
    emoji = '🤖';
    title = 'AI 赢了';
    setStatus('😵', '电脑赢了！');
  } else {
    setStatus('🤝', '平局！');
  }
  tpSetEnd(result.line, title);
  setTimeout(() => showDialog(emoji, title), 800);
}

function showDialog(emoji, title) {
  document.getElementById('dlgE').textContent = emoji;
  document.getElementById('dlgT').textContent = title;
  document.getElementById('dlgRecord').innerHTML =
    `已记录本局对战结果<br>已更新位置胜率`;
  document.getElementById('overlay').style.display = 'flex';
}

function closeDialog() {
  document.getElementById('overlay').style.display = 'none';
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function scheduleAI(ms) {
  const g = gameId;
  const seq = ++aiThinkSeq;
  setTimeout(() => runAI(g, seq), ms);
}

initRuleBoards();
initThinkBoard();
renderBoard();
updateThinkBoard();
document.getElementById('pracInput').value = stats.games;
pracGames = stats.games;
refreshAIStatus(stats.games);
syncPracInputLock();
if (isFirstVisit()) showRules();
else showRules();
</script>
